zerops:
  - setup: app
    build:
      base: nodejs@20
      buildCommands:
        - rm -rf node_modules
        - npm i
        - npx prisma generate
        - NEXTAUTH_SECRET=build-secret npm run build
      deployFiles:
        - .next
        - package.json
        - package-lock.json
        - node_modules
        - public
        - next.config.js
        - prisma
      cache:
        - node_modules
        - package-lock.json
    run:
      base: nodejs@20
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        DATABASE_URL: "postgresql://${db_user}:${db_password}@db:5432/db"
        NEXTAUTH_URL: "https://web-xdstv17ksf6rduj7emxgsw.prg1.zerops.app"
        NEXTAUTH_SECRET: "super-tajny-klic-pro-weight-tracker-app-2026"
      initCommands:
        - npx prisma db push --skip-generate --accept-data-loss
      start: npm start
