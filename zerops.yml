zerops:
  - setup: app
    build:
      base: nodejs@20
      buildCommands:
        - npm i
        - npx prisma generate
        - npm run build
      deployFiles:
        - .next
        - package.json
        - node_modules
        - public
        - next.config.js
        - prisma
      cache:
        - node_modules
        - package-lock.json
    run:
      base: nodejs@20
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        DATABASE_URL: "postgresql://${db_user}:${db_password}@db:5432/db"
      initCommands:
        - npx prisma db push --skip-generate --accept-data-loss
      start: npx next start -H 0.0.0.0 -p 3000
